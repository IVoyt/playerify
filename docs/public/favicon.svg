<svg width="64" height="64" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="vMini" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#42A5F5"/>
            <stop offset="100%" stop-color="#1976D2"/>
        </linearGradient>
    </defs>

    <!-- V background (slightly stronger for small sizes) -->
    <polygon points="10,10 60,110 110,10 85,10 60,70 35,10"
             fill="url(#vMini)" opacity="1"/>

    <!-- Circle (less transparent, thicker stroke for visibility) -->
    <circle cx="60" cy="55" r="32"
            fill="#0D1B2A"
            fill-opacity="0.4"
            stroke="white"
            stroke-width="3"/>

    <!-- Play icon (slightly thicker visually) -->
    <polygon points="45,35 85,55 45,75" fill="white"/>
</svg>